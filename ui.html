<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Laptop Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  :root {
    --bg:      #08080f;
    --surface: #111119;
    --border:  #1c1c2e;
    --accent:  #00e5ff;
    --green:   #00ff88;
    --red:     #ff4466;
    --yellow:  #ffc400;
    --text:    #e8eaf0;
    --muted:   #44465a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    padding: 28px 16px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  .header { text-align:center; margin-bottom:24px; }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px; font-weight: 800;
    letter-spacing: -0.5px;
  }
  .header h1 span { color: var(--accent); }
  .header p { color: var(--muted); font-size: 11px; margin-top:4px; letter-spacing:0.1em; }

  /* ── Status ── */
  .status {
    display:flex; align-items:center; gap:8px;
    background: var(--surface); border:1px solid var(--border);
    border-radius:999px; padding:8px 18px;
    font-size:12px; color:var(--muted);
    margin-bottom:24px; transition:all 0.3s;
    max-width:360px; width:100%;
    justify-content:center;
  }
  .status.ok     { border-color:rgba(0,255,136,0.35); color:var(--green); }
  .status.err    { border-color:rgba(255,68,102,0.35); color:var(--red); }
  .status.busy   { border-color:rgba(0,229,255,0.35); color:var(--accent); }
  .dot { width:7px; height:7px; border-radius:50%; background:currentColor; flex-shrink:0; }
  .busy .dot { animation: blink 0.7s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── Voice section ── */
  .voice-section {
    width:100%; max-width:360px;
    display:flex; flex-direction:column; align-items:center;
    gap:14px; margin-bottom:28px;
  }

  /* Big mic button */
  .mic-big {
    width:90px; height:90px;
    background: var(--surface);
    border:2px solid var(--border);
    border-radius:50%;
    font-size:36px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:all 0.2s;
    user-select:none;
  }
  .mic-big:active, .mic-big.recording {
    background:rgba(255,68,102,0.12);
    border-color:var(--red);
    box-shadow:0 0 0 8px rgba(255,68,102,0.1);
  }
  .mic-big.recording {
    animation: mic-ring 1s ease-in-out infinite;
  }
  @keyframes mic-ring {
    0%  { box-shadow:0 0 0 0   rgba(255,68,102,0.4); }
    70% { box-shadow:0 0 0 16px rgba(255,68,102,0); }
    100%{ box-shadow:0 0 0 0   rgba(255,68,102,0); }
  }
  .mic-hint { font-size:11px; color:var(--muted); letter-spacing:0.08em; }

  /* Text input row */
  .input-row {
    display:flex; gap:8px; width:100%;
  }
  input[type="text"] {
    flex:1;
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:10px; padding:14px 16px;
    font-size:14px; font-family:'JetBrains Mono',monospace;
    color:var(--text); outline:none;
    transition:border-color 0.2s;
  }
  input[type="text"]:focus { border-color:var(--accent); }
  input[type="text"]::placeholder { color:var(--muted); }

  .send-btn {
    background:var(--accent); color:#08080f;
    border:none; border-radius:10px;
    padding:14px 18px; font-size:18px;
    cursor:pointer; transition:opacity 0.15s, transform 0.1s;
    font-weight:700; flex-shrink:0;
  }
  .send-btn:active { opacity:0.8; transform:scale(0.95); }

  /* ── Divider ── */
  .divider {
    width:100%; max-width:360px;
    display:flex; align-items:center; gap:10px;
    margin-bottom:20px;
  }
  .divider-line { flex:1; height:1px; background:var(--border); }
  .divider-text { font-size:10px; color:var(--muted); letter-spacing:0.12em; white-space:nowrap; }

  /* ── Quick buttons ── */
  .section-label {
    width:100%; max-width:360px;
    font-size:10px; letter-spacing:0.15em;
    text-transform:uppercase; color:var(--muted);
    margin-bottom:10px;
  }

  .grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap:8px; width:100%; max-width:360px;
    margin-bottom:20px;
  }

  .btn {
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:10px; padding:16px 10px;
    color:var(--text); font-family:'JetBrains Mono',monospace;
    font-size:12px; font-weight:600;
    cursor:pointer; user-select:none;
    display:flex; flex-direction:column;
    align-items:center; gap:7px;
    transition:all 0.15s;
  }
  .btn:active { transform:scale(0.95); border-color:var(--accent); background:#131320; }
  .btn .icon  { font-size:22px; }
  .btn.wide   { grid-column:span 2; flex-direction:row; justify-content:center; gap:10px; }

  /* ── History ── */
  .history { width:100%; max-width:360px; margin-top:8px; }
  .history-list { display:flex; flex-direction:column; gap:6px; }
  .h-item {
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:10px 14px;
    display:flex; justify-content:space-between;
    align-items:center; gap:8px;
    cursor:pointer; transition:border-color 0.15s;
    font-size:12px;
  }
  .h-item:active { border-color:var(--accent); }
  .h-cmd  { color:#ccc; flex:1; }
  .h-res  { color:var(--muted); font-size:10px; text-align:right; white-space:nowrap; }
  .h-item.bye .h-cmd { color:var(--red); }
  .h-item.ok  .h-cmd { color:var(--green); }

  .empty { color:var(--muted); font-size:12px; text-align:center; padding:12px 0; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1><span>Laptop</span> Agent</h1>
  <p>LANGGRAPH · GPT-4o · VOICE + TEXT</p>
</div>

<!-- Status -->
<div class="status" id="status">
  <div class="dot"></div>
  <span id="status-text">Ready — speak or type a command</span>
</div>

<!-- Voice -->
<div class="voice-section">
  <div class="mic-big" id="micBtn" onclick="toggleMic()">🎤</div>
  <span class="mic-hint" id="micHint">TAP TO SPEAK</span>

  <!-- Text input -->
  <div class="input-row">
    <input type="text" id="cmd" placeholder="type a command..." />
    <button class="send-btn" onclick="sendText()">↑</button>
  </div>
</div>

<!-- Quick: YouTube -->
<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-text">YouTube</div>
  <div class="divider-line"></div>
</div>

<div class="grid">
  <button class="btn" onclick="send('pause')">
    <span class="icon">⏸</span>Pause
  </button>
  <button class="btn" onclick="send('play')">
    <span class="icon">▶️</span>Play
  </button>
  <button class="btn" onclick="send('volume up')">
    <span class="icon">🔊</span>Louder
  </button>
  <button class="btn" onclick="send('volume down')">
    <span class="icon">🔉</span>Quieter
  </button>
  <button class="btn" onclick="send('skip forward')">
    <span class="icon">⏩</span>+10s
  </button>
  <button class="btn" onclick="send('skip backward')">
    <span class="icon">⏪</span>-10s
  </button>
  <button class="btn" onclick="send('mute')">
    <span class="icon">🔇</span>Mute
  </button>
  <button class="btn" onclick="send('fullscreen')">
    <span class="icon">⛶</span>Fullscreen
  </button>
  <button class="btn" onclick="send('next video')">
    <span class="icon">⏭</span>Next
  </button>
  <button class="btn" onclick="send('previous video')">
    <span class="icon">⏮</span>Prev
  </button>
  <button class="btn wide" onclick="send('open youtube')">
    <span class="icon">▶</span>Open YouTube
  </button>
</div>

<!-- Quick: Browser -->
<div class="divider">
  <div class="divider-line"></div>
  <div class="divider-text">Browser</div>
  <div class="divider-line"></div>
</div>

<div class="grid">
  <button class="btn" onclick="send('open chrome')">
    <span class="icon">🌐</span>Chrome
  </button>
  <button class="btn" onclick="send('new tab')">
    <span class="icon">＋</span>New Tab
  </button>
  <button class="btn" onclick="send('close tab')">
    <span class="icon">✕</span>Close Tab
  </button>
  <button class="btn" onclick="send('refresh')">
    <span class="icon">↻</span>Refresh
  </button>
  <button class="btn" onclick="send('go back')">
    <span class="icon">←</span>Back
  </button>
  <button class="btn" onclick="send('go forward')">
    <span class="icon">→</span>Forward
  </button>
</div>

<!-- History -->
<div class="history">
  <div class="section-label">Recent</div>
  <div class="history-list" id="historyList">
    <div class="empty">No commands yet.</div>
  </div>
</div>

<script>
  const SERVER = `http://${window.location.hostname}:8000`;
  const history = [];
  let recognition = null;
  let isRecording = false;

  // ── Send ─────────────────────────────────────────────────────
  async function send(text) {
    if (!text.trim()) return;
    setStatus("busy", `Sending: "${text}"`);

    try {
      const res = await fetch(`${SERVER}/control`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      const isBye = data.status === "bye";
      setStatus(isBye ? "err" : "ok", (isBye ? "👋 " : "✓ ") + data.result);
      addHistory(text, data.result, data.status);
    } catch (e) {
      setStatus("err", "✗ Can't reach server — check WiFi");
    }
  }

  function sendText() {
    const val = document.getElementById("cmd").value.trim();
    if (val) { send(val); document.getElementById("cmd").value = ""; }
  }

  document.getElementById("cmd").addEventListener("keydown", e => {
    if (e.key === "Enter") sendText();
  });

  // ── Status ────────────────────────────────────────────────────
  function setStatus(type, msg) {
    const el = document.getElementById("status");
    el.className = "status " + type;
    document.getElementById("status-text").textContent = msg;
  }

  // ── History ───────────────────────────────────────────────────
  function addHistory(cmd, result, status) {
    history.unshift({ cmd, result, status });
    if (history.length > 6) history.pop();
    document.getElementById("historyList").innerHTML = history.map(h => `
      <div class="h-item ${h.status}" onclick="send('${h.cmd.replace(/'/g,"\\'")}')">
        <span class="h-cmd">${h.cmd}</span>
        <span class="h-res">${h.result}</span>
      </div>
    `).join("");
  }

  // ── Voice ─────────────────────────────────────────────────────
  function toggleMic() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setStatus("err", "Voice not supported — use Chrome browser");
      return;
    }

    if (isRecording) {
      recognition.stop();
      return;
    }

    recognition = new SR();
    recognition.lang = "en-US";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onstart = () => {
      isRecording = true;
      document.getElementById("micBtn").classList.add("recording");
      document.getElementById("micHint").textContent = "LISTENING...";
      setStatus("busy", "🎤 Listening...");
    };

    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      document.getElementById("cmd").value = transcript;
      setStatus("ok", `Heard: "${transcript}"`);
      send(transcript);
    };

    recognition.onerror = (e) => {
      setStatus("err", "Mic error: " + e.error);
    };

    recognition.onend = () => {
      isRecording = false;
      document.getElementById("micBtn").classList.remove("recording");
      document.getElementById("micHint").textContent = "TAP TO SPEAK";
    };

    recognition.start();
  }
</script>
</body>
</html>
